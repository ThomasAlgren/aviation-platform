<!DOCTYPE html>
<html>
<head>
    <title>Upload Part</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
        .upload-box { border: 2px dashed #ddd; border-radius: 8px; padding: 32px; text-align: center; cursor: pointer; }
        .preview { width: 100%; border-radius: 8px; margin-top: 12px; display: none; }
        .btn { background: #4a9eff; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 15px; cursor: pointer; width: 100%; margin-top: 8px; }
        .btn:disabled { background: #ccc; }
        .result { background: #f0f7ff; border-radius: 8px; padding: 16px; margin-top: 16px; display: none; white-space: pre-wrap; font-size: 14px; }
    </style>
</head>
<body>
    <div id="onboarding" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:16px; padding:32px; max-width:400px; width:90%; margin:20px;">
        <h2 style="margin-bottom:8px; font-size:20px;">Quick setup</h2>
        <p style="color:#666; font-size:14px; margin-bottom:24px;">Takes 10 seconds — saved for all your listings</p>
        <label style="font-size:13px; color:#666; display:block; margin-bottom:6px;">Currency</label>
        <select id="ob_currency" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; font-size:15px; margin-bottom:16px;">
            <option value="EUR">EUR — Euro</option>
            <option value="USD">USD — US Dollar</option>
            <option value="DKK">DKK — Danish Krone</option>
            <option value="GBP">GBP — British Pound</option>
        </select>
        <label style="font-size:13px; color:#666; display:block; margin-bottom:6px;">Your location</label>
        <input id="ob_location" type="text" placeholder="e.g. Copenhagen, Denmark" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; font-size:15px; margin-bottom:16px;">
        <label style="font-size:13px; color:#666; display:block; margin-bottom:6px;">Delivery</label>
        <select id="ob_delivery" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; font-size:15px; margin-bottom:24px;">
            <option value="Shipping">Shipping worldwide</option>
            <option value="Collection">Collection only</option>
            <option value="Both">Shipping or collection</option>
        </select>
        <button onclick="saveOnboarding()" style="background:#1a1a2e; color:white; border:none; padding:14px; border-radius:8px; font-size:15px; cursor:pointer; width:100%;">Save and continue</button>
    </div>
</div>
    <h2>PanPanParts - Upload Part</h2>

    <div class="card">
        <h3>1. Photo of part</h3>
        <div class="upload-box" onclick="document.getElementById('part-input').click()">
            Click to upload image
            <input type="file" id="part-input" accept="image/*" capture="environment" style="display:none" onchange="loadImage(this,'part-preview','part')">
        </div>
        <img id="part-preview" class="preview">
    </div>

    <div class="card">
        <h3>2. Photo of 8130-3 / Form 1 document</h3>
        <div class="upload-box" onclick="document.getElementById('doc-input').click()">
            Click to upload document
            <input type="file" id="doc-input" accept="image/*" capture="environment" style="display:none" onchange="loadImage(this,'doc-preview','doc')">
        </div>
        <img id="doc-preview" class="preview">
    </div>

    <button class="btn" id="btn" onclick="analyze()" disabled>Analyze with AI</button>

    <div class="result" id="result"></div>

    <script>
        var partB64 = null;
        var docB64 = null;
        var partB64 = null;
        var docB64 = null;

function checkOnboarding() {
    if (!localStorage.getItem('ppp_setup')) {
        document.getElementById('onboarding').style.display = 'flex';
    }
}

function saveOnboarding() {
    var currency = document.getElementById('ob_currency').value;
    var location = document.getElementById('ob_location').value;
    var delivery = document.getElementById('ob_delivery').value;
    if (!location) { alert('Please enter your location'); return; }
    localStorage.setItem('ppp_setup', '1');
    localStorage.setItem('ppp_currency', currency);
    localStorage.setItem('ppp_location', location);
    localStorage.setItem('ppp_delivery', delivery);
    document.getElementById('onboarding').style.display = 'none';
}

window.onload = checkOnboarding;
function loadImage(input, previewId, which) {
    var file = input.files[0];
    if (!file) return;
    var img = new Image();
    var url = URL.createObjectURL(file);
    img.onload = function() {
        var canvas = document.createElement('canvas');
        var max = 1200;
        var w = img.width, h = img.height;
        if (w > max) { h = h * max / w; w = max; }
        if (h > max) { w = w * max / h; h = max; }
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        var jpeg = canvas.toDataURL('image/jpeg', 0.7);
        document.getElementById(previewId).src = jpeg;
        document.getElementById(previewId).style.display = 'block';
        if (which === 'part') partB64 = jpeg.split(',')[1];
        if (which === 'doc') docB64 = jpeg.split(',')[1];
        document.getElementById('btn').disabled = !(partB64 && docB64);
        URL.revokeObjectURL(url);
    };
    img.src = url;
}

        function analyze() {
            document.getElementById('result').style.display = 'block';
            document.getElementById('result').textContent = 'Analyzing...';
            document.getElementById('btn').disabled = true;

            fetch('/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({part_image: partB64, doc_image: docB64})
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
if (data.part_id) { setTimeout(function() { window.location.href = '/listing/' + data.part_id; }, 2000); }
                document.getElementById('btn').disabled = false;
            })
            .catch(function(e) {
                document.getElementById('result').textContent = 'Error: ' + e.message;
                document.getElementById('btn').disabled = false;
            });
        }
    </script>
</body>
</html>
